name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enforce LF line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git checkout -- .

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: |
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Build Windows artifacts
        run: pnpm tauri build

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi |
            ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash)  $($_.Name)" | Out-File -FilePath release-checksums.txt -Append -Encoding utf8
            }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Timestamper — ${{ github.ref_name }}
          body_path: .github/release-notes/${{ github.ref_name }}.md
          files: |
            src-tauri/target/release/bundle/**/*
            release-checksums.txt
          prerelease: true
          draft: false
