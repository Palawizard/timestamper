name: Bug report (beta)
description: Report an issue with Timestamper beta
title: "[Beta] "
labels: ["bug", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the beta feedback. Describe the issue in observable terms.
        Do not include sensitive data (OBS password, full personal file paths).

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Live (session / timer / marks)
        - History (list / export / delete)
        - Settings (shortcuts)
        - OBS integration
        - Global hotkeys
        - Installation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Installed version
      placeholder: "0.1.0-beta.1"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a stream
        2. Press the add mark shortcut
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, OBS version if relevant
      placeholder: "Windows 11 24H2, OBS 31"
    validations:
      required: true
