name: Feature request
description: Suggest an improvement for Timestamper
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: Which streamer workflow would this feature support?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I understand Timestamper remains a local app without cloud sync for now
          required: true
