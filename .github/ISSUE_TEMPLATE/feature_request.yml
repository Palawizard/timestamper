name: Demande de fonctionnalité
description: Proposer une amélioration pour Timestamper
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème ou besoin
      description: Quel cas d'usage streamer cette fonctionnalité adresse-t-elle ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Optionnel

  - type: checkboxes
    id: scope
    attributes:
      label: Périmètre
      options:
        - label: Je comprends que Timestamper reste une app locale sans cloud pour l'instant
          required: true
